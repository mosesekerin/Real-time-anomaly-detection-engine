services:
  nginx:
    image: nginx:alpine
    volumes:
      - HNG-nginx-logs:/var/log/nginx
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/conf.d:/etc/nginx/conf.d:ro          # ADD: mounts our proxy config
    command: >
      /bin/sh -c "
        rm -f /var/log/nginx/access.log /var/log/nginx/error.log &&
        nginx -g 'daemon off;'
      "
    ports:
      - "80:80"
    networks:
      - internal                                       # ADD
    depends_on:
      - nextcloud                                      # ADD

  nextcloud:                                           # ADD: entire service
    image: kefaslungu/hng-nextcloud
    expose:
      - "80"                                           # internal only, not published
    networks:
      - internal
    restart: unless-stopped

  log-monitor:
    build: .
    volumes:
      - HNG-nginx-logs:/var/log/nginx:ro
    environment:
      NGINX_LOG_PATH: /var/log/nginx/hng-access.log
      DEAD_LETTER_PATH: /var/log/nginx/hng-access.dead.log
    restart: unless-stopped
    depends_on:
      - nginx

volumes:
  HNG-nginx-logs:
    external: true
    name: HNG-nginx-logs

networks:
  internal:                                            # ADD
    driver: bridge
