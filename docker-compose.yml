services:
  nginx:
    image: nginx:alpine
    volumes:
      - HNG-nginx-logs:/var/log/nginx
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    command: >
      /bin/sh -c "
        rm -f /var/log/nginx/access.log /var/log/nginx/error.log &&
        nginx -g 'daemon off;'
      "
    ports:
      - "80:80"

  log-monitor:
    build: .
    volumes:
      - HNG-nginx-logs:/var/log/nginx:ro   # read-only mount
    environment:
      NGINX_LOG_PATH: /var/log/nginx/hng-access.log
      DEAD_LETTER_PATH: /var/log/nginx/hng-access.dead.log
    restart: unless-stopped
    depends_on:
      - nginx

volumes:
  HNG-nginx-logs:
    external: true   # the existing volume from your Nginx setup
    name: HNG-nginx-logs
